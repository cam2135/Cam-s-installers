<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicom Installer</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f3f4f6; margin: 0; }
        .container { max-width: 500px; margin: 40px auto; background: #fff; border-radius: 18px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2em; text-align: center; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; margin-bottom: 1em; object-fit: cover; border: 3px solid #6366f1; }
        h1 { color: #3730a3; }
        .download-btn { background: #6366f1; color: #fff; border: none; border-radius: 12px; padding: 1em 2em; font-size: 1.1em; font-weight: 500; cursor: pointer; transition: background 0.2s; margin: 1em 0; text-decoration: none; display: inline-block; }
        .download-btn:hover { background: #4338ca; }
        .readme-section { background: #f3f4f6; border-radius: 12px; padding: 1.2em 1em; margin-top: 1.5em; text-align: left; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
        a.back { display: inline-block; margin-top: 1.5em; color: #6366f1; text-decoration: none; font-weight: 500; }
        a.back:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <img class="avatar" src="https://ui-avatars.com/api/?name=CH&background=6366f1&color=fff" alt="Avatar" />
        <h1>Clicom Installer</h1>
        <a class="download-btn" href="clicom.exe" download>Download .exe</a>
        <div class="readme-section">
            <h2>README</h2>
            <div id="readme-content">Loading README...</div>
        </div>
        <a class="back" href="index.html">&larr; Back to Installers</a>
    </div>
    <script>
    fetch('README3.md')
      .then(response => response.text())
      .then(md => {
        let html = md
          .replace(/^# (.*$)/gim, '<h1>$1</h1>')
          .replace(/^## (.*$)/gim, '<h2>$1</h2>')
          .replace(/^### (.*$)/gim, '<h3>$1</h3>')
          .replace(/\*\*(.*?)\*\*/gim, '<b>$1</b>')
          .replace(/\*(.*?)\*/gim, '<i>$1</i>')
          .replace(/\[(.*?)\]\((.*?)\)/gim, '<a href="$2" target="_blank">$1</a>')
          .replace(/\n$/gim, '<br />');
        document.getElementById('readme-content').innerHTML = html;
      })
      .catch(() => {
        document.getElementById('readme-content').innerText = 'README3.md not found.';
      });
    </script>
</body>
</html>
